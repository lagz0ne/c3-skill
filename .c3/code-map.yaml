  - cli/cmd/set_test.go
  - cli/cmd/testhelper_test.go
  - cli/main.go
  - ".c3/**"
  - docs/**
  - "*.md"
  - ".claude/**"
  - ".claude-plugin/**"
  - ".github/**"
  - "*.json"
  - "*.yaml"
  - "*.sh"
  - "packages/**"
  - "vscode-c3-nav/**"
