fact: rule-dispatcher-error-hint
claim: "user-facing CLI errors carry an actionable hint"
code:
  - cli/**/*.go
pipeline:
  - gather:
      command: "tmp=$(mktemp); (cd cli && go test ./cmd -run TestUserFacingErrorHints -count=1) >\"$tmp\" 2>&1; status=$?; if [ \"$status\" -ne 0 ]; then cat \"$tmp\"; rm -f \"$tmp\"; exit 2; fi; rm -f \"$tmp\""
  - eval:
      count: "== 0"
