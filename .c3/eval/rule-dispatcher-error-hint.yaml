fact: rule-dispatcher-error-hint
claim: "user-facing CLI errors carry an actionable hint"
code:
  - cli/main.go
pipeline:
  - gather:
      command: "grep -rn 'fmt.Errorf(\"error:' cli/cmd/*.go cli/main.go | grep -v 'hint:' | grep -v _test.go | head -25"
  - eval:
      judgement: "Each error above is constructed without an inline 'hint:'. Rule the run: are these legitimately exempt (internal/wrapped errors a user never sees), or are user-facing dispatcher errors missing the required hint? List any genuine miss."
