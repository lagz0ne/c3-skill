fact: rule-wrap-error-cause
claim: "errors crossing a boundary wrap their cause with %w, never flatten it with %v"
code:
  - cli/**/*.go
pipeline:
  - gather:
      command: "grep -rn 'fmt.Errorf(.*%v\", err)' cli/ --include='*.go' | grep -v _test.go"
      inputs:
        - cli/**/*.go
  - eval:
      count: "== 0"
