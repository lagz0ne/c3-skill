name: Build Distribution

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Check references
        run: bun run check-refs

      - name: Run gate tests
        run: ./scripts/test-c3-gate

      - name: Build
        run: bun run build

      - name: Verify build
        run: |
          ls -la dist/claude-code/
          ls -la dist/claude-code/.claude-plugin/
          ls -la dist/claude-code/skills/
          ls -la dist/claude-code/agents/

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push to dist branch
        run: |
          # Save README template before orphan checkout
          cp .github/dist-readme-template.md /tmp/dist-readme.md

          # Create orphan branch
          git checkout --orphan dist-temp
          git rm -rf . || true

          # Enable dotglob to include .claude-plugin
          shopt -s dotglob

          # Move output to root
          mv dist/claude-code/* .

          # Cleanup source-only artifacts (keep scripts/ and .claude-plugin/ from dist output)
          rm -rf dist node_modules src .github templates references .claude docs package.json bun.lock* tsconfig.json CLAUDE.md

          # Add README for dist branch
          cp /tmp/dist-readme.md README.md
          echo "" >> README.md
          echo "---" >> README.md
          echo "Built from commit: ${GITHUB_SHA::7}" >> README.md

          # Commit and push
          git add -A
          git commit -m "Build from ${GITHUB_SHA::7} [skip ci]"
          git push origin dist-temp:dist --force
