name: Build & Distribute

on:
  push:
    branches: [dev]

permissions:
  contents: write
  pull-requests: write

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Run tests
        working-directory: cli
        run: go test ./...

      - name: Cross-compile
        run: bash scripts/build.sh

      - name: Distribute to main via PR
        id: distribute
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="ci/distribute-dev-to-main"

          # Save built binaries
          mkdir -p /tmp/c3x-bins
          cp skills/c3/bin/c3x-*-*-* /tmp/c3x-bins/

          # Start from main (not dev) to avoid merge conflicts with old binaries
          git fetch origin main
          git checkout -B "$BRANCH" origin/main

          # Merge dev into the branch
          git merge origin/dev --no-edit

          # Remove stale binaries, add fresh ones
          git rm -f skills/c3/bin/c3x-*-*-* 2>/dev/null || true
          cp /tmp/c3x-bins/* skills/c3/bin/
          git add -f skills/c3/bin/c3x-*

          if ! git diff --staged --quiet; then
            git commit -m "build: update c3x binaries"
          fi

          # Force-push the distribute branch
          git push origin "$BRANCH" --force

          # Close any existing PR from this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            gh pr close "$EXISTING_PR" --delete-branch=false
          fi

          # Create and merge PR
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "ci: distribute dev to main" \
            --body "Automated merge of dev into main with built c3x binaries.")

          gh pr merge "$PR_URL" --merge --delete-branch

          # Read version for release step
          CURRENT_VERSION=$(cat skills/c3/bin/VERSION | tr -d '[:space:]')
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Check if release needed
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.distribute.outputs.version }}
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists, skipping"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New version: $VERSION"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout main for release
        if: steps.release_check.outputs.should_release == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create GitHub Release
        if: steps.release_check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.distribute.outputs.version }}
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # Generate changelog
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          fi

          {
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "---"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG:-initial}...v${VERSION}"
          } > /tmp/changelog.md

          # Package release asset
          zip -r "/tmp/c3-skill-v${VERSION}.zip" \
            .claude-plugin/ \
            skills/ \
            -x "*.DS_Store"

          # Create release
          gh release create "v${VERSION}" \
            --title "C3 v${VERSION}" \
            --notes-file /tmp/changelog.md \
            "/tmp/c3-skill-v${VERSION}.zip"

      - name: Build and publish @c3x/cli to npm
        if: steps.release_check.outputs.should_release == 'true'
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(cat ../../skills/c3/bin/VERSION | tr -d '[:space:]')
          npm pkg set version="$VERSION"
          npm install
          npm run build
          npm publish --access public
