name: Build & Distribute

on:
  push:
    branches: [dev]

permissions:
  contents: write
  pull-requests: write

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Run tests
        working-directory: cli
        run: go test ./...

      - name: Cross-compile
        run: bash scripts/build.sh

      - name: Distribute to main
        id: distribute
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save built binaries
          mkdir -p /tmp/c3x-bins
          cp skills/c3/bin/c3x-*-*-* /tmp/c3x-bins/

          # Start from main, merge dev in
          git fetch origin main
          git checkout -B ci/distribute origin/main
          git merge origin/dev --no-edit

          # Remove stale binaries, add fresh ones
          git rm -f skills/c3/bin/c3x-*-*-* 2>/dev/null || true
          cp /tmp/c3x-bins/* skills/c3/bin/
          git add -f skills/c3/bin/c3x-*

          if ! git diff --staged --quiet; then
            git commit -m "build: update c3x binaries"
          fi

          # Fast-forward main (ci/distribute is ahead of main, never behind)
          git checkout main
          git merge ci/distribute --ff-only
          git push origin main

          # Read version for release step
          CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Check if release needed
        id: release_check
        run: |
          VERSION=${{ steps.distribute.outputs.version }}
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, skipping"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New version: $VERSION"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.release_check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.distribute.outputs.version }}
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # Generate changelog
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          fi

          cat > /tmp/changelog.md <<CHANGELOG_EOF
## What's Changed

$COMMITS

---

**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG:-initial}...v${VERSION}
CHANGELOG_EOF

          # Package release asset
          zip -r "/tmp/c3-skill-v${VERSION}.zip" \
            .claude-plugin/ \
            skills/ \
            -x "*.DS_Store"

          # Create release
          gh release create "v${VERSION}" \
            --title "C3 v${VERSION}" \
            --notes-file /tmp/changelog.md \
            "/tmp/c3-skill-v${VERSION}.zip"
