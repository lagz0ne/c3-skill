name: Build & Distribute

on:
  push:
    branches: [dev]

permissions:
  contents: write

jobs:
  distribute:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Run tests
        working-directory: cli
        run: go test ./...

      - name: Cross-compile
        run: bash scripts/build.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build VS Code extension
        working-directory: vscode-c3-nav
        run: |
          npm ci
          npm run package

      - name: Distribute to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save built artifacts
          mkdir -p /tmp/c3x-bins
          cp skills/c3/bin/c3x-* /tmp/c3x-bins/
          cp vscode-c3-nav/c3-nav.vsix /tmp/c3-nav.vsix

          # Switch to main (create if first run)
          git checkout main 2>/dev/null || git checkout -b main

          # Merge dev → main (-X theirs: dev is source of truth for code)
          git merge dev -X theirs -m "merge: dev → main" --no-edit

          # Remove stale binaries from previous versions, then add new ones
          git rm -f skills/c3/bin/c3x-*-*-* 2>/dev/null || true
          cp /tmp/c3x-bins/* skills/c3/bin/
          git add -f skills/c3/bin/c3x-*

          # Copy built .vsix to repo
          cp /tmp/c3-nav.vsix vscode-c3-nav/c3-nav.vsix
          git add -f vscode-c3-nav/c3-nav.vsix

          # Commit only if build artifacts changed
          if git diff --staged --quiet; then
            echo "No build artifact changes to commit"
          else
            git commit -m "build: update c3x binaries and c3-nav.vsix"
          fi

          git fetch origin main
          git merge origin/main -X ours --no-edit
          git push origin main

      - name: Check version for release
        id: version
        run: |
          CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Current version: $CURRENT_VERSION"

          if git rev-parse "v$CURRENT_VERSION" >/dev/null 2>&1; then
            echo "Tag v$CURRENT_VERSION already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New version detected: $CURRENT_VERSION"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          fi

  release:
    needs: distribute
    if: needs.distribute.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (with binaries)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=${{ needs.distribute.outputs.version }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          fi

          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md
          echo "$COMMITS" >> changelog.md
          echo "" >> changelog.md
          echo "---" >> changelog.md
          echo "" >> changelog.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG:-initial}...v${{ steps.version.outputs.version }}" >> changelog.md

      - name: Prepare release assets
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p dist/release

          # Plugin zip — main has binaries in skills/c3/bin/
          zip -r "dist/release/c3-skill-v${VERSION}.zip" \
            .claude-plugin/ \
            skills/ \
            -x "*.DS_Store"

          # VS Code extension
          cp vscode-c3-nav/c3-nav.vsix dist/release/c3-nav.vsix

          ls -la dist/release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: C3 v${{ steps.version.outputs.version }}
          body_path: changelog.md
          files: dist/release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Go CLI**: binaries bundled in plugin" >> $GITHUB_STEP_SUMMARY
          echo "- **VS Code extension**: c3-nav.vsix" >> $GITHUB_STEP_SUMMARY
