name: Build & Distribute

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  MODEL_REVISION: 1110a243fdf4706b3f48f1d95db1a4f5529b4d41

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: packages/cli/package-lock.json
      - name: Go tests
        working-directory: cli
        run: |
          go build ./...
          go build -tags embedmodel ./...
          go test ./...
      - name: npm manager tests
        working-directory: packages/cli
        run: |
          npm ci
          npm test

  model-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Download pinned MiniLM assets
        run: |
          mkdir -p dist/model
          MODEL="c3x-semantic-model-all-MiniLM-L6-v2-${MODEL_REVISION}.onnx"
          VOCAB="c3x-semantic-vocab-all-MiniLM-L6-v2-${MODEL_REVISION}.txt"
          curl -fsSL "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/${MODEL_REVISION}/onnx/model.onnx" -o "dist/model/$MODEL"
          curl -fsSL "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/${MODEL_REVISION}/vocab.txt" -o "dist/model/$VOCAB"
          sha256sum "dist/model/$MODEL" > "dist/model/$MODEL.sha256"
          sha256sum "dist/model/$VOCAB" > "dist/model/$VOCAB.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: semantic-assets
          path: dist/model/*

  build:
    needs: [test, model-assets]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: amd64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
          - runner: macos-13
            os: darwin
            arch: amd64
          - runner: macos-14
            os: darwin
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - uses: actions/download-artifact@v4
        with:
          name: semantic-assets
          path: /tmp/c3x-model
      - name: Build thin npm assets and fat skill binaries
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MODEL="c3x-semantic-model-all-MiniLM-L6-v2-${MODEL_REVISION}.onnx"
          VOCAB="c3x-semantic-vocab-all-MiniLM-L6-v2-${MODEL_REVISION}.txt"
          cp "/tmp/c3x-model/$MODEL" cli/internal/store/semantic_model/model.onnx
          cp "/tmp/c3x-model/$VOCAB" cli/internal/store/semantic_model/vocab.txt
          bash scripts/build.sh --version "$VERSION" --variant both --os "${{ matrix.os }}" --arch "${{ matrix.arch }}" --out-dir dist/c3x
      - uses: actions/upload-artifact@v4
        with:
          name: c3x-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/c3x/**/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, model-assets]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
      - name: Assemble release assets
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist/release
          find dist/artifacts -type f -path '*/thin/c3x-*' -exec cp {} dist/release/ \;
          find dist/artifacts/semantic-assets -type f -exec cp {} dist/release/ \;

          fat_count=0
          while IFS= read -r fat; do
            fat_count=$((fat_count + 1))
            platform="$(basename "$fat" | sed -E "s/^c3x-${VERSION}-//; s/-fat$//")"
            work="/tmp/c3-skill-$platform"
            rm -rf "$work"
            mkdir -p "$work"
            cp -R .claude-plugin skills "$work/"
            rm -f "$work/skills/c3/bin/c3x-"*
            cp "$fat" "$work/skills/c3/bin/c3x-${VERSION}-${platform}"
            chmod +x "$work/skills/c3/bin/c3x-${VERSION}-${platform}"
            (cd "$work" && zip -r "c3-skill-${platform}-v${VERSION}.zip" .claude-plugin/ skills/ -x "*.DS_Store")
            cp "$work/c3-skill-${platform}-v${VERSION}.zip" dist/release/
          done < <(find dist/artifacts -type f -path '*/fat/c3x-*-fat' ! -name '*.sha256' | sort)
          if [ "$fat_count" -eq 0 ]; then
            echo "No fat skill binaries found" >&2
            exit 1
          fi

          (cd dist/release && sha256sum * > SHA256SUMS)
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --title "C3 v${VERSION}" --notes "C3 v${VERSION}"
          fi
          gh release upload "$GITHUB_REF_NAME" dist/release/* --clobber
