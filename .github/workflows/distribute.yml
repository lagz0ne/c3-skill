name: Build & Distribute

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: packages/cli/package-lock.json
      - name: Go tests
        working-directory: cli
        run: |
          go build ./...
          go build -tags embedmodel ./...
          go test ./...
      - name: npm manager tests
        working-directory: packages/cli
        run: |
          npm ci
          npm test
      - name: Install Linux packaging test dependencies
        run: sudo apt-get update && sudo apt-get install -y bubblewrap
      - name: Skill packaging tests
        run: python3 scripts/test_skill_release_packaging.py

  model-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - name: Download pinned MiniLM assets
        working-directory: cli
        run: go run ./tools/semantic-assets --release-dir ../dist/model
      - uses: actions/upload-artifact@v4
        with:
          name: semantic-assets
          path: dist/model/*

  build:
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: amd64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
          - runner: macos-14
            os: darwin
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build thin npm assets and skill binaries
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/build.sh --version "$VERSION" --variant release --os "${{ matrix.os }}" --arch "${{ matrix.arch }}" --out-dir dist/c3x
      - uses: actions/upload-artifact@v4
        with:
          name: c3x-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/c3x/**/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, model-assets]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
      - name: Assemble release assets
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/assemble_release_assets.sh \
            --version "$VERSION" \
            --artifacts-dir dist/artifacts \
            --out-dir dist/release
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --title "C3 v${VERSION}" --notes "C3 v${VERSION}"
          fi
          gh release upload "$GITHUB_REF_NAME" dist/release/* --clobber
