name: Build & Distribute

on:
  push:
    branches: [dev]

permissions:
  contents: write
  pull-requests: write

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Run tests
        working-directory: cli
        run: go test ./...

      - name: Cross-compile
        run: bash scripts/build.sh

      - name: Distribute to main via PR
        id: distribute
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="ci/distribute-dev-to-main"

          # Save built binaries before switching branches
          mkdir -p /tmp/c3x-bins
          cp skills/c3/bin/c3x-*-*-* /tmp/c3x-bins/

          # Start from dev (already checked out)
          git checkout -B "$BRANCH"

          # Remove stale binaries, restore freshly built ones
          git rm -f skills/c3/bin/c3x-*-*-* 2>/dev/null || true
          cp /tmp/c3x-bins/* skills/c3/bin/
          git add -f skills/c3/bin/c3x-*

          if ! git diff --staged --quiet; then
            git commit -m "build: update c3x binaries"
          fi

          # Force-push the distribute branch
          git push origin "$BRANCH" --force

          # Close any existing PR from this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            gh pr close "$EXISTING_PR" --delete-branch=false
          fi

          # Create and merge PR
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "ci: distribute dev → main" \
            --body "Automated merge of dev into main with built c3x binaries.")

          gh pr merge "$PR_URL" --merge --delete-branch

          # Read version for release step
          CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Check if release needed
        id: release_check
        run: |
          git fetch origin main
          CURRENT_VERSION=${{ steps.distribute.outputs.version }}
          if git rev-parse "v$CURRENT_VERSION" >/dev/null 2>&1; then
            echo "Tag v$CURRENT_VERSION already exists, skipping"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New version: $CURRENT_VERSION"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout main for release
        if: steps.release_check.outputs.should_release == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create GitHub Release
        if: steps.release_check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.distribute.outputs.version }}
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # Generate changelog
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          fi

          BODY="## What's Changed

          $COMMITS

          ---

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG:-initial}...v${VERSION}"

          # Package release asset
          zip -r "/tmp/c3-skill-v${VERSION}.zip" \
            .claude-plugin/ \
            skills/ \
            -x "*.DS_Store"

          # Create release
          gh release create "v${VERSION}" \
            --title "C3 v${VERSION}" \
            --notes "$BODY" \
            "/tmp/c3-skill-v${VERSION}.zip"
