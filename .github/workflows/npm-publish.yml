name: Publish @c3x/cli

on:
  push:
    branches: [dev]
    paths:
      - 'packages/cli/**'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version is new
        id: version_check
        working-directory: packages/cli
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view @c3x/cli version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL_VERSION" >> $GITHUB_OUTPUT
          echo "npm=$NPM_VERSION" >> $GITHUB_OUTPUT
          if [ "$LOCAL_VERSION" = "$NPM_VERSION" ]; then
            echo "Version $LOCAL_VERSION already published, skipping"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "New version: $LOCAL_VERSION (npm has $NPM_VERSION)"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.version_check.outputs.should_publish == 'true'
        working-directory: packages/cli
        run: |
          npm install
          npm run build

      - name: Publish
        if: steps.version_check.outputs.should_publish == 'true'
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
